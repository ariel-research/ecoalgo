{% extends "base.html" %}

{% block title %}Create Survey{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Create New Survey</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="title" class="form-label">Survey Title *</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="category" class="form-label">Category *</label>
                        <select class="form-select" id="category" name="category" required onchange="onCategoryChange(this.value)">
                            <option value="">Select a category…</option>
                            {% for key, label in categories.items() %}
                            <option value="{{ key }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                        <div id="category-hint" class="form-text mt-1" style="display:none"></div>
                    </div>

                    <!-- Ranking mode (hidden for budget_allocation — forced to budget) -->
                    <div class="mb-3" id="ranking-mode-section" style="display:none">
                        <label class="form-label">Preference Input Mode *</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="ranking_mode" id="ordinal" value="ordinal" checked onchange="onRankingModeChange()">
                            <label class="form-check-label" for="ordinal">
                                <strong>Ordinal</strong> — participants rank items 1st, 2nd, 3rd…
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="ranking_mode" id="rating" value="rating" onchange="onRankingModeChange()">
                            <label class="form-check-label" for="rating">
                                <strong>Rating</strong> — participants score each item independently
                            </label>
                        </div>
                    </div>

                    <div class="mb-3" id="budget-field" style="display:none">
                        <label for="total_points" class="form-label">Total Points to Distribute</label>
                        <input type="number" class="form-control" id="total_points" name="total_points" value="100" min="1">
                        <div class="form-text">Participants must distribute exactly this many points among all items.</div>
                    </div>

                    <div class="mb-3" id="rating-field" style="display:none">
                        <div class="row">
                            <div class="col-md-6">
                                <label for="min_score" class="form-label">Minimum Score</label>
                                <input type="number" class="form-control" id="min_score" name="min_score" value="1" min="0">
                            </div>
                            <div class="col-md-6">
                                <label for="max_score" class="form-label">Maximum Score</label>
                                <input type="number" class="form-control" id="max_score" name="max_score" value="10" min="1">
                            </div>
                        </div>
                        <div class="form-text">Each item is scored independently within this range.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Create Survey</button>
                        <a href="{{ url_for('survey_list') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
const CATEGORY_HINTS = {
    fair_division:          'Standard allocation: each item is assigned to one agent. Algorithms use ordinal or rating preferences.',
    capacitated_allocation: 'Multi-seat allocation: items have multiple slots and agents have capacity limits and weights. Participants will be asked to enter their weight and capacity.',
    budget_allocation:      'Participants distribute a fixed budget of points across items to express their preferences.',
    approval_voting:        'Participants tick the items they approve of. The algorithm selects a winning committee of items.',
};

function onCategoryChange(cat) {
    const hintEl = document.getElementById('category-hint');
    hintEl.textContent = CATEGORY_HINTS[cat] || '';
    hintEl.style.display = cat ? '' : 'none';

    const isBudget   = cat === 'budget_allocation';
    const isApproval = cat === 'approval_voting';
    const hideMode   = isBudget || isApproval;
    document.getElementById('ranking-mode-section').style.display = (!cat || hideMode) ? 'none' : '';
    document.getElementById('budget-field').style.display = isBudget ? 'block' : 'none';
    if (!hideMode) {
        document.getElementById('rating-field').style.display =
            document.getElementById('rating').checked ? 'block' : 'none';
    } else {
        document.getElementById('rating-field').style.display = 'none';
        document.getElementById('ordinal').checked = true;
    }
}

function onRankingModeChange() {
    const ratingMode = document.getElementById('rating').checked;
    document.getElementById('rating-field').style.display = ratingMode ? 'block' : 'none';
}
</script>
{% endblock %}
